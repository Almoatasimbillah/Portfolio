<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>404 — page not found · AlMoatasimbillah</title>
<meta name="theme-color" content="#0B0F1A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap">
<style>
  :root{
    --bg:#0B0F1A; --bg2:#131826;
    --text:#E8EEF4; --text-dim:#8593A8; --text-mute:#4F586C;
    --accent:#7DD3C0;
    --serif:'Instrument Serif',serif;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:var(--sans);min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:2rem;
    overflow:hidden;position:relative;
  }
  .aurora{
    position:fixed;inset:-15%;z-index:0;pointer-events:none;
    filter:blur(80px);opacity:.7;
    background:
      radial-gradient(ellipse 50% 40% at 30% 30%, rgba(125,211,192,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 70% 70%, rgba(125,211,192,0.20) 0%, transparent 55%);
    animation:drift 20s ease-in-out infinite alternate;
  }
  @keyframes drift{
    from{transform:translate(0,0) scale(1)}
    to{transform:translate(3%,-3%) scale(1.08)}
  }
  .wrap{position:relative;z-index:1;max-width:580px}
  .code{
    font-family:var(--serif);font-style:italic;
    font-size:clamp(8rem,22vw,16rem);line-height:.85;
    color:var(--accent);letter-spacing:-.05em;
    margin-bottom:1.5rem;
    opacity:.92;
  }
  .glitch{
    display:inline-block;
    animation:glitch 5s infinite;
  }
  @keyframes glitch{
    0%,90%,100%{transform:translate(0)}
    92%{transform:translate(-2px,1px)}
    94%{transform:translate(2px,-1px)}
    96%{transform:translate(-1px,2px)}
  }
  h1{
    font-family:var(--serif);font-weight:400;
    font-size:clamp(2rem,4vw,3.2rem);line-height:1.05;
    letter-spacing:-.025em;margin-bottom:1rem;
  }
  h1 em{color:var(--accent);font-style:italic}
  p{
    color:var(--text-dim);font-size:1.05rem;line-height:1.6;
    margin-bottom:2.5rem;max-width:480px;margin-inline:auto;
  }
  .back{
    color:var(--accent);font-size:1rem;text-decoration:none;
    border-bottom:1px solid var(--accent);padding-bottom:3px;
    display:inline-flex;gap:.5rem;align-items:center;
    transition:gap .3s cubic-bezier(.2,.7,.3,1);
  }
  .back:hover{gap:.9rem}
  .meta{
    position:fixed;top:1.2rem;left:1.2rem;
    font-family:var(--mono);font-size:.72rem;letter-spacing:.12em;
    color:var(--text-mute);text-transform:uppercase;
  }
  .meta em{color:var(--accent);font-style:italic}
</style>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>
  <span class="meta">err · <em>page_not_found</em></span>
  <div class="wrap">
    <div class="code"><span class="glitch">404.</span></div>
    <h1>That page <em>doesn't exist.</em></h1>
    <p>You might have followed an old link, or I broke something while updating. Either way — let's get you back.</p>
    <a href="/" class="back">Back to the portfolio <span>→</span></a>
  </div>
</body>
</html>
